<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Visual Review</title>
  <style>
    :root { --bg:#0b0d10; --card:#151922; --text:#eaf0ff; --muted:#9fb0d1; --accent:#6ea8fe; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1200px; margin:0 auto; padding:18px; }
    .top { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
    .btn { border:1px solid #2b3448; background:var(--card); color:var(--text); border-radius:10px; padding:8px 12px; cursor:pointer; }
    .btn.active { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
    .input { background:var(--card); color:var(--text); border:1px solid #2b3448; border-radius:10px; padding:8px 10px; min-width:220px; }
    .meta { color:var(--muted); font-size:13px; margin-bottom:10px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap:12px; }
    .card { background:var(--card); border:1px solid #252c3d; border-radius:12px; overflow:hidden; }
    .imgbox { aspect-ratio: 1 / 1; background:#0f131b; display:flex; align-items:center; justify-content:center; }
    img { width:100%; height:100%; object-fit:cover; display:block; }
    .content { padding:9px; }
    .file { font-size:12px; color:#d2ddf7; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tags { margin-top:5px; display:flex; justify-content:space-between; font-size:12px; color:var(--muted); }
    a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:0 0 8px">Brand Visual Review</h2>
    <div class="meta" id="stats">Chargement...</div>
    <div class="top">
      <button class="btn active" data-filter="all">All</button>
      <button class="btn" data-filter="brand_visual">Brand</button>
      <button class="btn" data-filter="not_brand">Not brand</button>
      <button class="btn" data-filter="uncertain">Uncertain</button>
      <input id="search" class="input" placeholder="Rechercher tweet_..." />
      <label class="meta"><input id="onlyHigh" type="checkbox" /> conf ≥ 0.6</label>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const DATA_PATH = './analysis/brand_classification_3classes.json';
    const IMG_BASE = './clean/'; // requires clean/ folder available locally

    let allItems = [];
    let activeFilter = 'all';

    const grid = document.getElementById('grid');
    const stats = document.getElementById('stats');
    const search = document.getElementById('search');
    const onlyHigh = document.getElementById('onlyHigh');

    function tweetUrlFromFile(file){
      const m = file.match(/tweet_(\d+)\.png/);
      return m ? `https://x.com/i/web/status/${m[1]}` : '#';
    }

    function render(){
      const q = search.value.trim().toLowerCase();
      const minConf = onlyHigh.checked ? 0.6 : 0;
      const items = allItems.filter(it => {
        if (activeFilter !== 'all' && it.class !== activeFilter) return false;
        if (it.confidence < minConf) return false;
        if (q && !it.file.toLowerCase().includes(q)) return false;
        return true;
      });

      const counts = allItems.reduce((a,it)=>{a[it.class]=(a[it.class]||0)+1; return a;}, {});
      stats.textContent = `Total ${allItems.length} | brand ${counts.brand_visual||0} | not_brand ${counts.not_brand||0} | uncertain ${counts.uncertain||0} | affichés ${items.length}`;

      grid.innerHTML = items.map(it => `
        <div class="card">
          <div class="imgbox">
            <img loading="lazy" src="${IMG_BASE}${it.file}" alt="${it.file}" onerror="this.style.opacity=.25" />
          </div>
          <div class="content">
            <div class="file" title="${it.file}">${it.file}</div>
            <div class="tags">
              <span>${it.class}</span>
              <span>${Number(it.confidence).toFixed(2)}</span>
            </div>
            <div style="margin-top:6px"><a href="${tweetUrlFromFile(it.file)}" target="_blank">ouvrir tweet ↗</a></div>
          </div>
        </div>
      `).join('');
    }

    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        render();
      });
    });

    search.addEventListener('input', render);
    onlyHigh.addEventListener('change', render);

    fetch(DATA_PATH)
      .then(r => r.json())
      .then(data => { allItems = data; render(); })
      .catch(err => {
        stats.textContent = 'Erreur chargement JSON: ' + err;
      });
  </script>
</body>
</html>
